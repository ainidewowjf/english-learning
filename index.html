<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语大师 - 键盘输入学单词</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 800px;
            min-height: 600px;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 20px 30px;
            text-align: center;
        }
        .header h1 { font-size: 24px; }
        .page { display: none; padding: 40px; }
        .page.active { display: block; }
        
        /* 首页卡片 */
        .nav-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .nav-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .nav-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .nav-card i { font-size: 40px; margin-bottom: 15px; }
        .nav-card h3 { font-size: 18px; margin-bottom: 10px; }
        .nav-card p { font-size: 14px; opacity: 0.9; }
        
        /* 级别选择 */
        .level-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 30px;
        }
        .level-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 25px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .level-btn:hover { transform: scale(1.05); }
        .level-btn small { display: block; font-size: 12px; opacity: 0.8; margin-top: 5px; }
        
        /* 课程列表 */
        .lesson-list { max-height: 400px; overflow-y: auto; }
        .lesson-item {
            background: #f8f9fa;
            padding: 20px;
            margin-bottom: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .lesson-item:hover { background: #e9ecef; }
        .lesson-item h4 { color: #333; margin-bottom: 5px; }
        .lesson-item p { color: #666; font-size: 14px; }
        
        /* 学习页面 */
        .word-display { text-align: center; margin-bottom: 30px; }
        .word-text { font-size: 48px; font-weight: bold; color: #333; }
        .word-phonetic { font-size: 18px; color: #666; margin: 10px 0; }
        .word-chinese { font-size: 24px; color: #667eea; margin: 15px 0; }
        .input-area { margin: 30px 0; }
        .input-area input {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
        }
        .input-area input:focus { outline: none; border-color: #667eea; }
        .input-area input.correct { border-color: #10b981; background: #d1fae5; }
        .input-area input.wrong { border-color: #ef4444; background: #fee2e2; }
        
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
        }
        .btn-secondary { background: #6c757d; }
        .back-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
        }
        
        .feedback { font-size: 18px; margin: 20px 0; height: 30px; }
        .feedback.success { color: #10b981; }
        .feedback.error { color: #ef4444; }
        
        .spike-icon { cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 英语大师 - 键盘输入学单词</h1>
        </div>
        
        <!-- 首页 -->
        <div id="homePage" class="page active">
            <div style="text-align: center;">
                <h2 style="color: #333; margin-bottom: 10px;">欢迎开始英语学习！</h2>
                <p style="color: #666;">通过键盘输入练习，真正掌握每个单词</p>
            </div>
            <div class="nav-cards">
                <div class="nav-card" onclick="showLevelSelector()">
                    <i class="fas fa-book"></i>
                    <h3>系统课程</h3>
                    <p>A1-C2 全级别课程</p>
                </div>
                <div class="nav-card" onclick="showPracticeList()">
                    <i class="fas fa-dumbbell"></i>
                    <h3>专项练习</h3>
                    <p>强化训练模块</p>
                </div>
                <div class="nav-card" onclick="showGrammarGuide()">
                    <i class="fas fa-brain"></i>
                    <h3>语法详解</h3>
                    <p>深入理解语法</p>
                </div>
            </div>
        </div>

        <!-- 级别选择 -->
        <div id="levelSelectorPage" class="page">
            <button class="back-btn" onclick="showHomePage()"><i class="fas fa-arrow-left"></i> 返回首页</button>
            <h2 style="color: #333;">选择级别</h2>
            <div class="level-grid" id="levelGrid"></div>
        </div>

        <!-- 课程列表 -->
        <div id="lessonListPage" class="page">
            <button class="back-btn" onclick="showLevelSelector()"><i class="fas fa-arrow-left"></i> 返回级别选择</button>
            <h2 style="color: #333;" id="levelTitle"></h2>
            <div class="lesson-list" id="lessonList"></div>
        </div>

        <!-- 单词学习 -->
        <div id="learningPage" class="page">
            <button class="back-btn" onclick="quitLesson()"><i class="fas fa-times"></i> 退出本课</button>
            <div class="word-display">
                <div class="word-text" id="wordText"></div>
                <div class="word-phonetic">
                    <span id="wordPhonetic"></span>
                    <span class="spike-icon" onclick="speakCurrentWord()">🔊</span>
                </div>
                <div class="word-chinese" id="wordChinese"></div>
            </div>
            <div class="input-area">
                <input type="text" id="wordInput" placeholder="请完整输入这个单词" onkeyup="handleInput(event)">
            </div>
            <div class="feedback" id="feedback"></div>
            <div style="text-align: center;">
                <button class="btn" id="checkBtn" onclick="checkAnswer()">提交答案 (Enter)</button>
                <button class="btn btn-secondary" id="nextBtn" onclick="nextWord()" style="display:none;">下一个单词</button>
            </div>
        </div>

        <!-- 句子练习 -->
        <div id="sentencePage" class="page">
            <button class="back-btn" onclick="quitLesson()"><i class="fas fa-times"></i> 退出本课</button>
            <h3 style="color: #333; margin-bottom: 20px;">用刚学的单词完成句子</h3>
            <div class="word-display">
                <div class="word-chinese" id="sentenceChinese"></div>
                <div style="margin: 20px 0; padding: 20px; background: #f8f9fa; border-radius: 10px;">
                    <span id="sentenceBlank" style="font-size: 20px; color: #666;"></span>
                    <span class="spike-icon" onclick="speakSentence()">🔊</span>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="sentenceInput" placeholder="请输入完整句子" onkeyup="handleInput(event)">
            </div>
            <div class="feedback" id="sentenceFeedback"></div>
            <div style="text-align: center;">
                <button class="btn" id="sentenceCheckBtn" onclick="checkSentence()">提交 (Enter)</button>
                <button class="btn btn-secondary" id="finishBtn" onclick="finishLesson()" style="display:none;">完成课程 🎉</button>
            </div>
        </div>

        <!-- 完成页面 -->
        <div id="completePage" class="page">
            <div style="text-align: center; padding: 60px 0;">
                <div style="font-size: 80px; margin-bottom: 30px;">🎉</div>
                <h2 style="color: #333; margin-bottom: 20px;">太棒了!</h2>
                <p style="color: #666; font-size: 18px; margin-bottom: 30px;">你完成了这节课的学习！</p>
                <p style="color: #667eea; font-size: 16px;" id="learnedCount"></p>
                <button class="btn" onclick="showLevelSelector()">继续学习下一课</button>
            </div>
        </div>

        <!-- 练习列表和语法页面占位 -->
        <div id="practicePage" class="page">
            <button class="back-btn" onclick="showHomePage()"><i class="fas fa-arrow-left"></i> 返回首页</button>
            <h2>专项练习（开发中...）</h2>
            <p style="color: #666; margin-top: 20px;">此模块即将上线，敬请期待！</p>
        </div>

        <div id="grammarPage" class="page">
            <button class="back-btn" onclick="showHomePage()"><i class="fas fa-arrow-left"></i> 返回首页</button>
            <h2>语法详解（开发中...）</h2>
            <p style="color: #666; margin-top: 20px;">此模块即将上线，敬请期待！</p>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
