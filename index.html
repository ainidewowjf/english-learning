<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语大师 - 从 A1 到 C2 完整学习</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 900px;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 700;
        }
        
        .level-badge {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        
        /* 课程选择器 */
        .lesson-selector {
            padding: 20px 30px;
            background: #f9fafb;
            border-bottom: 2px solid #e5e7eb;
        }
        
        .selector-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .selector-btn {
            padding: 10px 20px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .selector-btn:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }
        
        .current-lesson-info {
            flex: 1;
            text-align: center;
        }
        
        .current-lesson-title {
            font-size: 18px;
            font-weight: 700;
            color: #1f2937;
        }
        
        .current-lesson-level {
            font-size: 13px;
            color: #6b7280;
            margin-top: 3px;
        }
        
        /* 步骤指示器 */
        .steps {
            display: flex;
            background: #f3f4f6;
            padding: 15px 30px;
            gap: 10px;
        }
        
        .step {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            background: #e5e7eb;
            color: #6b7280;
            position: relative;
            transition: all 0.3s;
        }
        
        .step.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        
        .step.completed {
            background: #10b981;
            color: white;
        }
        
        .step-icon {
            font-size: 18px;
            display: block;
            margin-bottom: 3px;
        }
        
        /* 主内容区 */
        .content {
            padding: 40px;
        }
        
        .page {
            display: none;
        }
        
        .page.active {
            display: block;
        }
        
        /* 单词卡片 */
        .word-card {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .word-header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .chinese-hint {
            font-size: 32px;
            color: #1f2937;
            font-weight: 700;
        }
        
        .speech-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .speech-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }
        
        .input-large {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            font-size: 28px;
            text-align: center;
            border: 3px solid #e5e7eb;
            border-radius: 15px;
            outline: none;
            transition: all 0.3s;
            margin: 20px auto;
            display: block;
        }
        
        .input-large:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 5px rgba(99, 102, 241, 0.15);
        }
        
        .input-large.correct {
            border-color: #10b981;
            background: #d1fae5;
            animation: bounceIn 0.5s;
        }
        
        .input-large.wrong {
            border-color: #ef4444;
            background: #fee2e2;
            animation: shake 0.5s;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-20px); }
            40%, 80% { transform: translateX(20px); }
        }
        
        @keyframes bounceIn {
            0% { transform: scale(0.9); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .phonetic {
            font-size: 18px;
            color: #6b7280;
            margin: 10px 0;
            font-style: italic;
        }
        
        .feedback {
            min-height: 30px;
            font-size: 18px;
            font-weight: 600;
            margin: 15px 0;
        }
        
        .feedback.correct { color: #10b981; }
        .feedback.wrong { color: #ef4444; }
        
        .learned-list {
            background: #f9fafb;
            padding: 20px;
            border-radius: 12px;
            margin: 25px 0;
        }
        
        .learned-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .learned-chip {
            padding: 8px 16px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .learned-chip .play-btn {
            background: rgba(255,255,255,0.3);
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
        }
        
        .btn {
            padding: 15px 40px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }
        
        .btn-secondary {
            background: #e5e7eb;
            color: #374151;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 组句练习 */
        .sentence-practice {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .lesson-title {
            text-align: center;
            font-size: 20px;
            color: #6b7280;
            margin-bottom: 20px;
        }
        
        .sentence-info {
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            text-align: center;
        }
        
        .sentence-chinese {
            font-size: 26px;
            color: #1f2937;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .sentence-input {
            width: 100%;
            max-width: 600px;
            padding: 18px;
            font-size: 22px;
            text-align: center;
            border: 3px solid #e5e7eb;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
            margin: 0 auto;
            display: block;
        }
        
        .sentence-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 5px rgba(99, 102, 241, 0.15);
        }
        
        .sentence-input.correct {
            border-color: #10b981;
            background: #d1fae5;
        }
        
        .sentence-input.wrong {
            border-color: #ef4444;
            background: #fee2e2;
        }
        
        /* 完成页 */
        .completion-page {
            text-align: center;
        }
        
        .completion-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: popIn 0.5s;
        }
        
        @keyframes popIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        
        .completion-title {
            font-size: 32px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 15px;
        }
        
        .completion-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        
        .stat-box {
            background: linear-gradient(135deg, #f9fafb, #e5e7eb);
            padding: 25px;
            border-radius: 15px;
        }
        
        .stat-box .value {
            font-size: 36px;
            font-weight: 700;
            color: #6366f1;
        }
        
        .stat-box .label {
            font-size: 13px;
            color: #6b7280;
            margin-top: 5px;
        }
        
        .review-section {
            background: #f9fafb;
            padding: 25px;
            border-radius: 15px;
            margin: 25px 0;
        }
        
        .review-grid {
            display: grid;
            gap: 15px;
            margin-top: 15px;
        }
        
        .review-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .review-word {
            font-weight: 700;
            color: #6366f1;
            font-size: 18px;
        }
        
        .review-meaning {
            color: #6b7280;
        }
        
        .play-small {
            background: #6366f1;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-graduation-cap"></i> 英语大师 Pro</h1>
            <div class="level-badge" id="currentLevelBadge">A1 入门级</div>
        </div>
        
        <div class="lesson-selector">
            <div class="selector-controls">
                <button class="selector-btn" id="prevLessonBtn"><i class="fas fa-chevron-left"></i> 上一课</button>
                <div class="current-lesson-info">
                    <div class="current-lesson-title" id="lessonTitle">加载中...</div>
                    <div class="current-lesson-level" id="lessonInfo">第 1 课 / 共 51 课</div>
                </div>
                <button class="selector-btn" id="nextLessonBtn">下一课 <i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
        
        <div class="steps">
            <div class="step active" id="step1">
                <span class="step-icon">📚</span>
                <span>学习单词</span>
            </div>
            <div class="step" id="step2">
                <span class="step-icon">✍️</span>
                <span>组成句子</span>
            </div>
            <div class="step" id="step3">
                <span class="step-icon">🎉</span>
                <span>完成</span>
            </div>
        </div>
        
        <div class="content">
            <!-- 单词学习页 -->
            <div id="page-word" class="page active">
                <div class="word-card">
                    <div class="word-header">
                        <button class="speech-btn" id="playWordBtn" title="播放发音">
                            <i class="fas fa-volume-up"></i>
                        </button>
                        <div class="chinese-hint" id="chineseHint">请点击开始</div>
                    </div>
                    
                    <div class="learned-list" id="learnedList" style="display:none;">
                        <h4 style="margin-bottom: 15px; color: #374151;">✅ 已掌握的单词：</h4>
                        <div class="learned-chips" id="learnedChips"></div>
                    </div>
                    
                    <input type="text" 
                           class="input-large" 
                           id="wordInput" 
                           placeholder="请输入英文单词"
                           autocomplete="off"
                           autocorrect="off"
                           autocapitalize="off"
                           spellcheck="false">
                    
                    <div class="phonetic" id="phoneticDisplay"></div>
                    <div class="feedback" id="feedback"></div>
                    
                    <div class="buttons">
                        <button class="btn btn-secondary" id="skipBtn">跳过</button>
                        <button class="btn btn-primary" id="checkWordBtn">✓ 检查 (回车)</button>
                        <button class="btn btn-primary" id="nextWordBtn" style="display:none">下一个 (回车) →</button>
                    </div>
                </div>
            </div>
            
            <!-- 组句练习页 -->
            <div id="page-sentence" class="page">
                <div class="sentence-practice">
                    <div class="lesson-title">用刚学的单词组成完整句子</div>
                    
                    <div class="sentence-info">
                        <div class="sentence-chinese" id="sentenceChinese"></div>
                        <div style="font-size: 14px; color: #6b7280; margin-top: 10px;">
                            <i class="fas fa-lightbulb"></i> 提示：用上方学习过的单词填空
                        </div>
                    </div>
                    
                    <input type="text" 
                           class="sentence-input" 
                           id="sentenceInput" 
                           placeholder="请输入完整句子 (按回车提交)"
                           autocomplete="off"
                           autocorrect="off"
                           autocapitalize="off"
                           spellcheck="false">
                    
                    <div class="feedback" id="sentenceFeedback"></div>
                    
                    <div class="buttons">
                        <button class="btn btn-secondary" id="resetSentenceBtn">🔄 重置</button>
                        <button class="btn btn-primary" id="checkSentenceBtn">✓ 检查 (回车)</button>
                        <button class="btn btn-primary" id="finishBtn" style="display:none">完成学习 🎉</button>
                    </div>
                </div>
            </div>
            
            <!-- 完成页 -->
            <div id="page-complete" class="page completion-page">
                <div class="completion-icon">🎉</div>
                <div class="completion-title">恭喜完成本课！</div>
                
                <div class="completion-stats">
                    <div class="stat-box">
                        <div class="value" id="wordsLearned">0</div>
                        <div class="label">学习单词</div>
                    </div>
                    <div class="stat-box">
                        <div class="value" id="correctCount">0</div>
                        <div class="label">正确次数</div>
                    </div>
                    <div class="stat-box">
                        <div class="value" id="accuracyRate">0%</div>
                        <div class="label">准确率</div>
                    </div>
                </div>
                
                <div class="review-section">
                    <h4 style="color: #374151; margin-bottom: 15px;">📝 学习内容回顾</h4>
                    <div class="review-grid" id="reviewGrid"></div>
                </div>
                
                <div class="buttons">
                    <button class="btn btn-secondary" onclick="location.reload()">🔁 重学本课</button>
                    <button class="btn btn-primary" id="anotherLessonBtn">下一课 →</button>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
