<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词组句练习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 800px;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .tabs {
            display: flex;
            background: #f3f4f6;
            border-bottom: 2px solid #e5e7eb;
        }
        
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            background: transparent;
            font-size: 16px;
        }
        
        .tab:hover {
            background: #e5e7eb;
        }
        
        .tab.active {
            background: white;
            color: #6366f1;
            border-bottom: 3px solid #6366f1;
        }
        
        .content {
            padding: 40px;
        }
        
        .page {
            display: none;
        }
        
        .page.active {
            display: block;
        }
        
        /* 单词学习页面 */
        .word-section {
            text-align: center;
        }
        
        .word-display {
            margin-bottom: 30px;
        }
        
        .current-word {
            font-size: 48px;
            font-weight: 700;
            color: #6366f1;
            margin-bottom: 10px;
        }
        
        .phonetic {
            font-size: 18px;
            color: #6b7280;
            margin-bottom: 15px;
        }
        
        .chinese-hint {
            font-size: 20px;
            color: #10b981;
            font-weight: 600;
            margin-bottom: 20px;
            min-height: 30px;
        }
        
        .input-area {
            margin: 30px 0;
        }
        
        .input-field {
            width: 100%;
            max-width: 400px;
            padding: 15px 20px;
            font-size: 24px;
            text-align: center;
            border: 3px solid #e5e7eb;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
        }
        
        .input-field:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        
        .input-field.correct {
            border-color: #10b981;
            background: #d1fae5;
        }
        
        .input-field.wrong {
            border-color: #ef4444;
            background: #fee2e2;
        }
        
        .feedback {
            min-height: 30px;
            font-size: 18px;
            font-weight: 600;
            margin: 20px 0;
        }
        
        .feedback.correct {
            color: #10b981;
        }
        
        .feedback.wrong {
            color: #ef4444;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #6366f1;
            color: white;
        }
        
        .btn-primary:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #e5e7eb;
            color: #374151;
        }
        
        .btn-secondary:hover {
            background: #d1d5db;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 进度显示 */
        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: #6b7280;
            font-size: 14px;
        }
        
        .progress-bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            transition: width 0.3s;
        }
        
        /* 组句练习页面 */
        .sentence-practice {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .sentence-chinese {
            font-size: 24px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .word-bank {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            min-height: 60px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 12px;
        }
        
        .word-chip {
            padding: 12px 20px;
            background: white;
            border: 2px solid #6366f1;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            color: #6366f1;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }
        
        .word-chip:hover {
            background: #6366f1;
            color: white;
            transform: scale(1.05);
        }
        
        .answer-area {
            min-height: 80px;
            padding: 20px;
            background: #eff6ff;
            border: 3px dashed #6366f1;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        
        .answer-area.empty::before {
            content: "点击单词组成句子";
            color: #9ca3af;
            font-size: 16px;
        }
        
        .stats-card {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 13px;
            opacity: 0.9;
        }
        
        .result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .result-modal.show {
            display: flex;
        }
        
        .result-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            animation: popIn 0.3s;
        }
        
        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .result-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        .result-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .result-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }
        
        .result-stat {
            text-align: center;
        }
        
        .result-stat .value {
            font-size: 32px;
            font-weight: 700;
            color: #6366f1;
        }
        
        .result-stat .label {
            font-size: 14px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 英语单词组句练习</h1>
            <p>通过输入单词 + 组成句子，彻底掌握英语</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" data-tab="learn">单词输入学习</button>
            <button class="tab" data-tab="sentence">组句练习</button>
            <button class="tab" data-tab="summary">学习统计</button>
        </div>
        
        <!-- 单词学习页面 -->
        <div id="learn" class="page active">
            <div class="content">
                <div class="stats-card">
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value" id="learnedCount">0</div>
                            <div class="stat-label">已学单词</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="correctCount">0</div>
                            <div class="stat-label">正确次数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="accuracy">0%</div>
                            <div class="stat-label">准确率</div>
                        </div>
                    </div>
                </div>
                
                <div class="word-section">
                    <div class="progress-info">
                        <span>进度：<span id="currentNum">1</span>/<span id="totalCount">20</span></span>
                        <span>难度：入门级</span>
                    </div>
                    
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                    
                    <div class="word-display">
                        <div class="current-word" id="wordDisplay">hello</div>
                        <div class="phonetic" id="phoneticDisplay">/həˈloʊ/</div>
                        <div class="chinese-hint" id="chineseHint">提示：你好</div>
                    </div>
                    
                    <div class="input-area">
                        <input type="text" 
                               class="input-field" 
                               id="wordInput" 
                               placeholder="请输入英文单词"
                               autocomplete="off"
                               autocorrect="off"
                               autocapitalize="off"
                               spellcheck="false">
                    </div>
                    
                    <div class="feedback" id="feedback"></div>
                    
                    <div class="buttons">
                        <button class="btn btn-secondary" id="hintBtn">💡 显示中文</button>
                        <button class="btn btn-primary" id="checkBtn">✓ 检查答案</button>
                        <button class="btn btn-primary" id="nextBtn" style="display:none">下一题 →</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 组句练习页面 -->
        <div id="sentence" class="page">
            <div class="content">
                <div class="sentence-practice">
                    <div class="progress-info">
                        <span>第 <span id="sentenceNum">1</span> 题</span>
                        <span>共 10 题</span>
                    </div>
                    
                    <div class="progress-bar">
                        <div class="progress-fill" id="sentenceProgress" style="width: 0%"></div>
                    </div>
                    
                    <div class="sentence-chinese" id="sentenceChinese">
                        你好，很高兴认识你。
                    </div>
                    
                    <div class="word-bank" id="wordBank">
                        <!-- 动态生成 -->
                    </div>
                    
                    <div class="answer-area empty" id="answerArea">
                        <!-- 答案区域 -->
                    </div>
                    
                    <div class="feedback" id="sentenceFeedback"></div>
                    
                    <div class="buttons">
                        <button class="btn btn-secondary" id="clearBtn">🔄 清空</button>
                        <button class="btn btn-primary" id="submitBtn">✓ 提交答案</button>
                        <button class="btn btn-primary" id="nextSentenceBtn" style="display:none">下一题 →</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 统计页面 -->
        <div id="summary" class="page">
            <div class="content">
                <div class="stats-card">
                    <h2 style="margin-bottom: 20px;">学习总览</h2>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value" id="totalLearned">0</div>
                            <div class="stat-label">已学单词</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="totalSentences">0</div>
                            <div class="stat-label">完成句子</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="avgAccuracy">0%</div>
                            <div class="stat-label">平均准确率</div>
                        </div>
                    </div>
                </div>
                
                <div style="background: #f9fafb; padding: 20px; border-radius: 12px; margin-top: 20px;">
                    <h3 style="margin-bottom: 15px;">已掌握的单词</h3>
                    <div id="masteredWords" style="display: flex; flex-wrap: wrap; gap: 10px;">
                        <!-- 动态生成 -->
                    </div>
                </div>
                
                <button class="btn btn-primary" onclick="app.resetData()" style="margin-top: 20px;">
                    🗑️ 重置所有数据
                </button>
            </div>
        </div>
    </div>
    
    <!-- 结果弹窗 -->
    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <div class="result-icon" id="resultIcon">🎉</div>
            <div class="result-title" id="resultTitle">练习完成！</div>
            <div class="result-stats">
                <div class="result-stat">
                    <div class="value" id="resultCorrect">0</div>
                    <div class="label">正确</div>
                </div>
                <div class="result-stat">
                    <div class="value" id="resultTotal">10</div>
                    <div class="label">总数</div>
                </div>
                <div class="result-stat">
                    <div class="value" id="resultPercent">0%</div>
                    <div class="label">正确率</div>
                </div>
            </div>
            <button class="btn btn-primary" onclick="app.closeResult()">继续学习</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
