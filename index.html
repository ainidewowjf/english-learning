<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语大师 Pro - A1 到 C2 完整英语学习</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 1000px;
            overflow: hidden;
            min-height: 700px;
        }
        
        .header {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 { font-size: 24px; font-weight: 700; }
        
        /* 首页导航 */
        .home-page {
            padding: 40px;
        }
        
        .nav-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        
        .nav-card {
            background: linear-gradient(135deg, #f9fafb, #e5e7eb);
            border-radius: 15px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
        }
        
        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.3);
            border-color: #6366f1;
        }
        
        .nav-card-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .nav-card-title {
            font-size: 20px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 10px;
        }
        
        .nav-card-desc {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.6;
        }
        
        /* 级别选择页 */
        .level-selector {
            padding: 40px;
        }
        
        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .level-btn {
            background: linear-gradient(135deg, #e5e7eb, #d1d5db);
            border: none;
            border-radius: 15px;
            padding: 30px 20px;
            cursor: pointer;
            font-size: 28px;
            font-weight: 700;
            color: #374151;
            transition: all 0.3s;
        }
        
        .level-btn:hover {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            transform: scale(1.05);
        }
        
        .level-btn.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        
        /* 课程列表 */
        .lesson-list {
            padding: 30px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .lesson-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f9fafb;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .lesson-item:hover {
            background: #e5e7eb;
            transform: translateX(5px);
        }
        
        .lesson-number {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-right: 15px;
        }
        
        .lesson-info { flex: 1; }
        .lesson-title { font-weight: 600; color: #1f2937; }
        .lesson-level { font-size: 12px; color: #6b7280; }
        
        /* 专项练习列表 */
        .practice-categories {
            padding: 30px;
        }
        
        .category-section {
            margin-bottom: 30px;
        }
        
        .category-title {
            font-size: 18px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .practice-item {
            background: #f9fafb;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .practice-item:hover {
            background: #e5e7eb;
        }
        
        .practice-title {
            font-weight: 700;
            color: #6366f1;
            margin-bottom: 5px;
        }
        
        .practice-desc {
            font-size: 14px;
            color: #6b7280;
        }
        
        /* 语法指南列表 */
        .grammar-list {
            padding: 30px;
        }
        
        .grammar-item {
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid #6366f1;
        }
        
        .grammar-item:hover {
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
        }
        
        .grammar-title {
            font-weight: 700;
            color: #1f2937;
            font-size: 18px;
            margin-bottom: 8px;
        }
        
        .grammar-summary {
            font-size: 14px;
            color: #6b7280;
        }
        
        /* 内容区域 */
        .content-area {
            padding: 30px;
            display: none;
        }
        
        .content-area.active { display: block; }
        
        /* 通用返回按钮 */
        .back-btn {
            padding: 10px 20px;
            background: #e5e7eb;
            color: #374151;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .back-btn:hover { background: #d1d5db; }
        
        /* 步骤指示器 */
        .steps {
            display: flex;
            background: #f3f4f6;
            padding: 15px 30px;
            gap: 10px;
        }
        
        .step {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            background: #e5e7eb;
            color: #6b7280;
        }
        
        .step.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        
        .step.completed {
            background: #10b981;
            color: white;
        }
        
        /* 单词卡片样式 */
        .word-card {
            text-align: center;
            padding: 40px;
        }
        
        .word-header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .chinese-hint {
            font-size: 32px;
            color: #1f2937;
            font-weight: 700;
        }
        
        .speech-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .speech-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }
        
        .input-large {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            font-size: 28px;
            text-align: center;
            border: 3px solid #e5e7eb;
            border-radius: 15px;
            outline: none;
            margin: 20px auto;
            display: block;
            transition: all 0.3s;
        }
        
        .input-large:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 5px rgba(99, 102, 241, 0.15);
        }
        
        .input-large.correct {
            border-color: #10b981;
            background: #d1fae5;
            animation: bounceIn 0.5s;
        }
        
        .input-large.wrong {
            border-color: #ef4444;
            background: #fee2e2;
            animation: shake 0.5s;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-20px); }
            40%, 80% { transform: translateX(20px); }
        }
        
        @keyframes bounceIn {
            0% { transform: scale(0.9); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .phonetic {
            font-size: 18px;
            color: #6b7280;
            margin: 10px 0;
        }
        
        .feedback {
            min-height: 30px;
            font-size: 18px;
            font-weight: 600;
            margin: 15px 0;
        }
        
        .feedback.correct { color: #10b981; }
        .feedback.wrong { color: #ef4444; }
        
        .learned-list {
            background: #f9fafb;
            padding: 20px;
            border-radius: 12px;
            margin: 25px 0;
        }
        
        .learned-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .learned-chip {
            padding: 8px 16px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .learned-chip .play-btn {
            background: rgba(255,255,255,0.3);
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
        }
        
        .btn {
            padding: 15px 40px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }
        
        .btn-secondary {
            background: #e5e7eb;
            color: #374151;
        }
        
        /* 专项练习样式 */
        .practice-card {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
        }
        
        .practice-question {
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 25px;
            font-size: 24px;
            color: #1f2937;
            font-weight: 600;
            text-align: center;
        }
        
        .practice-input {
            width: 100%;
            max-width: 500px;
            padding: 18px;
            font-size: 22px;
            text-align: center;
            border: 3px solid #e5e7eb;
            border-radius: 12px;
            outline: none;
            margin: 0 auto;
            display: block;
            transition: all 0.3s;
        }
        
        .practice-input:focus {
            border-color: #6366f1;
        }
        
        .explanation {
            background: #fef3c7;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #f59e0b;
        }
        
        .explanation-title {
            font-weight: 700;
            color: #92400e;
            margin-bottom: 10px;
        }
        
        .grammar-point {
            font-size: 14px;
            color: #78350f;
        }
        
        /* 语法讲解样式 */
        .grammar-detail {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px;
        }
        
        .grammar-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .grammar-header h2 {
            font-size: 32px;
            color: #1f2937;
            margin-bottom: 10px;
        }
        
        .grammar-level-badge {
            display: inline-block;
            padding: 6px 16px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .grammar-summary {
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 16px;
            color: #1e40af;
        }
        
        .grammar-rules {
            margin: 25px 0;
        }
        
        .rule-card {
            background: #f9fafb;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #6366f1;
        }
        
        .rule-title {
            font-weight: 700;
            color: #1f2937;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .rule-example {
            background: #e0f2fe;
            padding: 12px 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            color: #0369a1;
        }
        
        .common-mistakes {
            background: #fef2f2;
            border-radius: 12px;
            padding: 20px;
            margin: 25px 0;
        }
        
        .mistake-title {
            font-weight: 700;
            color: #dc2626;
            margin-bottom: 15px;
        }
        
        .mistake-item {
            padding: 8px 0;
            color: #6b7280;
        }
        
        .exercise-list {
            margin: 25px 0;
        }
        
        .exercise-item {
            background: #f0fdf4;
            border: 2px solid #86efac;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
        }
        
        .exercise-q {
            font-size: 18px;
            font-weight: 600;
            color: #166534;
            margin-bottom: 10px;
        }
        
        .exercise-answer {
            font-size: 14px;
            color: #15803d;
        }
        
        /* 完成页 */
        .completion-page {
            text-align: center;
            padding: 50px;
        }
        
        .completion-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .completion-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        
        .stat-box {
            background: linear-gradient(135deg, #f9fafb, #e5e7eb);
            padding: 25px;
            border-radius: 15px;
        }
        
        .stat-box .value {
            font-size: 36px;
            font-weight: 700;
            color: #6366f1;
        }
        
        .stat-box .label {
            font-size: 13px;
            color: #6b7280;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-graduation-cap"></i> 英语大师 Pro</h1>
            <div id="currentPageBadge">首页</div>
        </div>
        
        <!-- 首页导航 -->
        <div id="homePage" class="home-page active">
            <div style="text-align: center; margin-bottom: 20px;">
                <h2 style="color: #1f2937;">选择学习方式</h2>
                <p style="color: #6b7280;">从基础词汇到高级语法，全方位掌握英语</p>
            </div>
            
            <div class="nav-cards">
                <div class="nav-card" onclick="window.showLevelSelector()">
                    <div class="nav-card-icon">📚</div>
                    <div class="nav-card-title">系统课程</div>
                    <div class="nav-card-desc">按等级学习词汇和句子，从 A1 入门级到 C2 精通级，共 51+ 课</div>
                </div>
                
                <div class="nav-card" onclick="window.showPracticeList()">
                    <div class="nav-card-icon">✍️</div>
                    <div class="nav-card-title">专项练习</div>
                    <div class="nav-card-desc">针对性训练代词、单复数、时态等薄弱环节，快速提升</div>
                </div>
                
                <div class="nav-card" onclick="window.showGrammarGuide()">
                    <div class="nav-card-icon">💡</div>
                    <div class="nav-card-title">语法详解</div>
                    <div class="nav-card-desc">深入理解语法规则，为什么这样组句，避免常见错误</div>
                </div>
            </div>
        </div>
        
        <!-- 级别选择页 -->
        <div id="levelSelectorPage" class="level-selector content-area">
            <button class="back-btn" onclick="window.showHomePage()"><i class="fas fa-arrow-left"></i> 返回首页</button>
            <h2 style="text-align: center; color: #1f2937;">选择级别</h2>
            <div class="level-grid">
                <button class="level-btn" data-level="A1" onclick="window.selectLevel('A1')">A1<br><small style="font-size:12px;">入门级</small></button>
                <button class="level-btn" data-level="A2" onclick="window.selectLevel('A2')">A2<br><small style="font-size:12px;">初级</small></button>
                <button class="level-btn" data-level="B1" onclick="window.selectLevel('B1')">B1<br><small style="font-size:12px;">中级</small></button>
                <button class="level-btn" data-level="B2" onclick="window.selectLevel('B2')">B2<br><small style="font-size:12px;">中高级</small></button>
                <button class="level-btn" data-level="C1" onclick="window.selectLevel('C1')">C1<br><small style="font-size:12px;">高级</small></button>
                <button class="level-btn" data-level="C2" onclick="window.selectLevel('C2')">C2<br><small style="font-size:12px;">精通级</small></button>
            </div>
            
            <div id="lessonListContainer" style="display:none;">
                <h3 id="selectedLevelTitle" style="margin: 30px 0 20px;"></h3>
                <div id="lessonList" class="lesson-list"></div>
            </div>
        </div>
        
        <!-- 课程学习页 -->
        <div id="lessonLearnPage" class="content-area">
            <div class="steps">
                <div class="step active" id="step1">📚 学单词</div>
                <div class="step" id="step2">✍️ 组句子</div>
                <div class="step" id="step3">🎉 完成</div>
            </div>
            
            <div id="page-word" class="page active">
                <div class="word-card">
                    <div class="word-header">
                        <button class="speech-btn" id="playWordBtn" title="播放发音">
                            <i class="fas fa-volume-up"></i>
                        </button>
                        <div class="chinese-hint" id="chineseHint">请点击开始</div>
                    </div>
                    
                    <div class="learned-list" id="learnedList" style="display:none;">
                        <h4 style="margin-bottom: 15px; color: #374151;">✅ 已掌握的单词：</h4>
                        <div class="learned-chips" id="learnedChips"></div>
                    </div>
                    
                    <input type="text" 
                           class="input-large" 
                           id="wordInput" 
                           placeholder="请输入英文单词"
                           autocomplete="off"
                           autocorrect="off"
                           autocapitalize="off"
                           spellcheck="false">
                    
                    <div class="phonetic" id="phoneticDisplay"></div>
                    <div class="feedback" id="feedback"></div>
                    
                    <div class="buttons">
                        <button class="btn btn-secondary" id="skipBtn">跳过</button>
                        <button class="btn btn-primary" id="checkWordBtn">✓ 检查 (回车)</button>
                        <button class="btn btn-primary" id="nextWordBtn" style="display:none">下一个 (回车) →</button>
                    </div>
                </div>
            </div>
            
            <div id="page-sentence" class="page" style="display:none;">
                <div class="practice-card">
                    <div style="text-align:center;margin-bottom:20px;color:#6b7280;">用刚学的单词组成完整句子</div>
                    
                    <div style="background:linear-gradient(135deg,#eff6ff,#dbeafe);padding:25px;border-radius:15px;margin-bottom:25px;text-align:center;">
                        <div class="chinese-hint" id="sentenceChinese" style="font-size:26px;"></div>
                        <div style="font-size:14px;color:#6b7280;margin-top:10px;"><i class="fas fa-lightbulb"></i> 提示：用上方学习过的单词填空</div>
                    </div>
                    
                    <input type="text" 
                           class="practice-input" 
                           id="sentenceInput" 
                           placeholder="请输入完整句子 (按回车提交)"
                           autocomplete="off">
                    
                    <div class="feedback" id="sentenceFeedback"></div>
                    
                    <div class="buttons">
                        <button class="btn btn-secondary" id="resetSentenceBtn">🔄 重置</button>
                        <button class="btn btn-primary" id="checkSentenceBtn">✓ 检查 (回车)</button>
                        <button class="btn btn-primary" id="finishLessonBtn" style="display:none">完成学习 🎉</button>
                    </div>
                </div>
            </div>
            
            <div id="page-complete" class="page completion-page" style="display:none;">
                <div class="completion-icon">🎉</div>
                <h2 style="color:#1f2937;margin-bottom:10px;">恭喜完成本课！</h2>
                
                <div class="completion-stats">
                    <div class="stat-box">
                        <div class="value" id="wordsLearnedCount">0</div>
                        <div class="label">学习单词</div>
                    </div>
                    <div class="stat-box">
                        <div class="value" id="correctCountVal">0</div>
                        <div class="label">正确次数</div>
                    </div>
                    <div class="stat-box">
                        <div class="value" id="accuracyRateVal">0%</div>
                        <div class="label">准确率</div>
                    </div>
                </div>
                
                <div class="buttons">
                    <button class="btn btn-secondary" onclick="location.reload()">🔁 重学本课</button>
                    <button class="btn btn-primary" id="nextLessonFromCompleteBtn">下一课 →</button>
                </div>
            </div>
        </div>
        
        <!-- 专项练习列表页 -->
        <div id="practiceListPage" class="practice-categories content-area">
            <button class="back-btn" onclick="window.showHomePage()"><i class="fas fa-arrow-left"></i> 返回首页</button>
            <h2 style="text-align: center; color: #1f2937; margin-bottom: 30px;">专项练习</h2>
            <div id="practiceCategories"></div>
        </div>
        
        <!-- 专项练习进行页 -->
        <div id="practiceRunPage" class="content-area">
            <button class="back-btn" onclick="window.showPracticeList()"><i class="fas fa-arrow-left"></i> 返回练习列表</button>
            <div class="practice-card">
                <div style="text-align:center;margin-bottom:20px;">
                    <span id="practiceTitleDisplay" style="font-size:20px;font-weight:700;color:#6366f1;"></span>
                    <span style="margin:0 10px;color:#6b7280;">|</span>
                    <span id="practiceProgress" style="color:#10b981;font-weight:600;">第 1/10 题</span>
                </div>
                
                <div class="practice-question" id="practiceQuestion"></div>
                
                <div class="learned-list" id="practiceHelp" style="display:none;margin-bottom:20px;">
                    <h4 style="margin-bottom:10px;">💡 相关知识点：</h4>
                    <div id="helpContent" style="font-size:14px;color:#6b7280;"></div>
                </div>
                
                <input type="text" 
                       class="practice-input" 
                       id="practiceInput" 
                       placeholder="输入答案 (按回车提交)"
                       autocomplete="off">
                
                <div id="practiceExplanation" class="explanation" style="display:none;"></div>
                <div class="feedback" id="practiceFeedback"></div>
                
                <div class="buttons">
                    <button class="btn btn-secondary" id="showAnswerBtn">显示答案</button>
                    <button class="btn btn-primary" id="checkPracticeBtn">✓ 检查 (回车)</button>
                    <button class="btn btn-primary" id="nextPracticeBtn" style="display:none">下一题 →</button>
                </div>
            </div>
        </div>
        
        <!-- 语法详解页 -->
        <div id="grammarDetailPage" class="content-area">
            <button class="back-btn" onclick="window.showHomePage()"><i class="fas fa-arrow-left"></i> 返回首页</button>
            <h2 style="text-align:center;color:#1f2937;margin:20px 0 30px;">语法指南</h2>
            <div id="grammarListView" class="grammar-list"></div>
            
            <div id="grammarDetailView" style="display:none;">
                <div class="grammar-detail">
                    <div class="grammar-header">
                        <h2 id="detTitle"></h2>
                        <span class="grammar-level-badge" id="detLevel"></span>
                    </div>
                    <div class="grammar-summary" id="detSummary"></div>
                    <div class="grammar-rules" id="detRules"></div>
                    <div class="common-mistakes" id="detMistakes"></div>
                    <h3 style="color:#1f2937;margin:30px 0 15px;">📝 实战练习</h3>
                    <div class="exercise-list" id="detExercises"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
