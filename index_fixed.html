<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语大师 - 快速测试版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 800px; padding: 40px; }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        .test-section { margin: 20px 0; padding: 20px; border: 2px solid #ddd; border-radius: 10px; }
        .btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 15px 30px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin: 10px; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .status { margin-top: 15px; padding: 15px; border-radius: 8px; }
        .success { background: #d1fae5; color: #065f46; }
        .error { background: #fee2e2; color: #991b1b; }
        input { width: 100%; padding: 15px; font-size: 18px; border: 2px solid #ddd; border-radius: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Chrome 语音修复测试</h1>
        
        <div class="test-section">
            <h3>测试 1: 基础语音播放</h3>
            <button class="btn" onclick="testSpeak()">点击播放 "Hello World"</button>
            <div id="status1"></div>
        </div>
        
        <div class="test-section">
            <h3>测试 2: 完整句子播放</h3>
            <input type="text" id="customText" placeholder="输入要朗读的英文" value="This is a test sentence for voice synthesis."/>
            <button class="btn" onclick="testCustomSpeak()">播放自定义文本</button>
            <div id="status2"></div>
        </div>
        
        <div class="test-section">
            <h3>测试 3: 语音列表检测</h3>
            <button class="btn" onclick="checkVoices()">查看可用语音</button>
            <div id="voicesList" style="margin-top: 15px;"></div>
        </div>
    </div>

    <script>
    let selectedVoice = null;
    
    function checkVoices() {
        const voices = speechSynthesis.getVoices();
        const div = document.getElementById('voicesList');
        div.innerHTML = `<strong>共找到 ${voices.length} 个语音：</strong><br>` + 
            voices.map(v => `${v.name} (${v.lang})`).join('<br>');
        console.log('可用语音:', voices);
        
        // 选择最佳美式英语
        for (const v of voices) {
            if (v.name.includes('Google US English') || v.name.includes('Zira')) {
                selectedVoice = v;
                break;
            }
        }
        if (!selectedVoice) {
            selectedVoice = voices.find(v => v.lang === 'en-US');
        }
        console.log('选中语音:', selectedVoice ? selectedVoice.name : '无');
    }
    
    // 立即尝试加载语音
    setTimeout(checkVoices, 500);
    setTimeout(checkVoices, 1500);
    
    // 监听语音变化
    if (speechSynthesis.onvoiceschanged) {
        speechSynthesis.onvoiceschanged = checkVoices;
    }
    
    function testSpeak() {
        speak("Hello World");
        document.getElementById('status1').innerHTML = '<div class="success">✅ 已发送播放指令！请听声音</div>';
    }
    
    function testCustomSpeak() {
        const text = document.getElementById('customText').value;
        if (text.trim()) {
            speak(text);
            document.getElementById('status2').innerHTML = '<div class="success">✅ 已发送播放指令！请听声音</div>';
        }
    }
    
    function speak(text) {
        console.log('🔊 Speak called with:', text);
        
        if (!('speechSynthesis' in window)) {
            alert('浏览器不支持语音合成！');
            return;
        }
        
        try {
            // 先停止任何正在播放的声音
            speechSynthesis.cancel();
            
            // 创建新的语音请求
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;
            
            if (selectedVoice) {
                utterance.voice = selectedVoice;
                console.log('使用语音:', selectedVoice.name);
            }
            
            // 添加事件监听
            utterance.onstart = () => console.log('🔊 开始播放');
            utterance.onend = () => console.log('✅ 播放结束');
            utterance.onerror = (e) => console.error('❌ 播放错误:', e);
            
            // 执行播放
            speechSynthesis.speak(utterance);
            console.log('✅ speak() 调用成功');
        } catch (e) {
            console.error('❌ 异常:', e);
            alert('播放失败：' + e.message);
        }
    }
    
    // 页面加载完成后预初始化
    window.addEventListener('load', () => {
        console.log('页面已加载，准备就绪');
        // 静音预加载（某些浏览器需要）
        setTimeout(() => {
            const pre = new SpeechSynthesisUtterance('.');
            pre.volume = 0;
            speechSynthesis.speak(pre);
        }, 500);
    });
    </script>
</body>
</html>
