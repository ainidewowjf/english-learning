<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语大师 Pro - 完整英语学习系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 900px; min-height: 700px; overflow: hidden; position: relative; }
        .header { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; padding: 20px 30px; text-align: center; }
        .header h1 { font-size: 26px; }
        .page { display: none; padding: 40px; }
        .page.active { display: block; }
        
        /* 首页卡片 */
        .nav-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; margin-top: 30px; }
        .nav-card { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 35px 25px; border-radius: 15px; text-align: center; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; }
        .nav-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .nav-card i { font-size: 45px; margin-bottom: 15px; display: block; }
        .nav-card h3 { font-size: 20px; margin-bottom: 10px; }
        .nav-card p { font-size: 14px; opacity: 0.95; }
        
        /* 级别选择 */
        .level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .level-btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 25px 20px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: transform 0.3s; }
        .level-btn:hover { transform: scale(1.05); }
        .level-btn small { display: block; font-size: 12px; opacity: 0.9; margin-top: 5px; }
        
        /* 课程列表 */
        .lesson-list { max-height: 400px; overflow-y: auto; }
        .lesson-item { background: #f8f9fa; padding: 20px; margin-bottom: 12px; border-radius: 12px; cursor: pointer; transition: background 0.3s; border-left: 4px solid #667eea; }
        .lesson-item:hover { background: #e9ecef; }
        .lesson-item h4 { color: #333; margin-bottom: 8px; }
        .lesson-item p { color: #666; font-size: 14px; }
        
        /* 学习页面 */
        .word-display { text-align: center; margin-bottom: 30px; padding: 30px; background: #f8f9fa; border-radius: 15px; }
        .word-text { font-size: 56px; font-weight: bold; color: #333; }
        .word-phonetic { font-size: 20px; color: #666; margin: 15px 0; }
        .spike-icon { cursor: pointer; margin-left: 10px; font-size: 24px; }
        .word-meaning { font-size: 28px; color: #667eea; margin: 20px 0; font-weight: 500; }
        .word-root { background: #fff3cd; padding: 15px; border-radius: 10px; margin: 15px 0; font-size: 15px; color: #856404; }
        
        /* 输入区域 */
        .input-area { margin: 30px 0; }
        .input-area input { width: 100%; padding: 18px; font-size: 22px; border: 3px solid #ddd; border-radius: 12px; text-align: center; transition: border-color 0.3s, background 0.3s; }
        .input-area input:focus { outline: none; border-color: #667eea; }
        .input-area input.correct { border-color: #10b981; background: #d1fae5; }
        .input-area input.wrong { border-color: #ef4444; background: #fee2e2; }
        
        /* 按钮 */
        .btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 16px 45px; font-size: 18px; border-radius: 12px; cursor: pointer; margin: 10px; transition: transform 0.2s; }
        .btn:hover { transform: scale(1.02); }
        .btn-secondary { background: #6c757d; }
        .back-btn { background: none; border: none; color: #667eea; cursor: pointer; font-size: 16px; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 5px; }
        
        /* 反馈信息 */
        .feedback { font-size: 20px; margin: 20px 0; height: 35px; text-align: center; font-weight: 500; }
        .feedback.success { color: #10b981; }
        .feedback.error { color: #ef4444; }
        
        /* 句子练习 */
        .sentence-blank { margin: 25px 0; padding: 25px; background: linear-gradient(135deg, #e0e7ff, #f3e8ff); border-radius: 15px; font-size: 22px; color: #333; text-align: center; line-height: 1.6; }
        .sentence-highlight { color: #667eea; font-weight: bold; border-bottom: 3px dashed #667eea; padding: 0 10px; }
        
        /* 语法详解 */
        .grammar-card { background: linear-gradient(135deg, #fef3c7, #fde68a); padding: 25px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid #f59e0b; }
        .grammar-title { font-size: 20px; font-weight: bold; color: #92400e; margin-bottom: 12px; }
        .grammar-content { color: #78350f; line-height: 1.8; }
        .grammar-example { background: white; padding: 15px; border-radius: 8px; margin-top: 12px; font-style: italic; }
        
        /* 完成页面 */
        .complete-page { text-align: center; padding: 60px 0; }
        .complete-icon { font-size: 100px; margin-bottom: 30px; }
        .stats { font-size: 24px; color: #667eea; margin: 20px 0; }
        
        /* 进度条 */
        .progress-bar { height: 8px; background: #e5e7eb; border-radius: 4px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.3s; }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .level-grid { grid-template-columns: repeat(2, 1fr); }
            .word-text { font-size: 40px; }
            .container { min-height: 100vh; border-radius: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 英语大师 Pro - 完整英语学习系统</h1>
        </div>
        
        <!-- 首页 -->
        <div id="homePage" class="page active">
            <div style="text-align: center;">
                <h2 style="color: #333; margin-bottom: 15px;">欢迎开始英语学习之旅！</h2>
                <p style="color: #666; font-size: 16px;">通过词根记忆 + 键盘输入 + 句型训练，全面提升英语水平</p>
            </div>
            <div class="nav-cards">
                <div class="nav-card" onclick="showLevelSelector()">
                    <i class="fas fa-book-open"></i>
                    <h3>系统课程</h3>
                    <p>A1-C2 全级别 · 词根词缀 · 核心词汇</p>
                </div>
                <div class="nav-card" onclick="showPracticeList()">
                    <i class="fas fa-dumbbell"></i>
                    <h3>专项练习</h3>
                    <p>听力强化 · 句型转换 · 快速拼写</p>
                </div>
                <div class="nav-card" onclick="showGrammarGuide()">
                    <i class="fas fa-brain"></i>
                    <h3>语法详解</h3>
                    <p>时态语态 · 从句结构 · 主谓一致</p>
                </div>
            </div>
        </div>

        <!-- 级别选择 -->
        <div id="levelSelectorPage" class="page">
            <button class="back-btn" onclick="showHomePage()"><i class="fas fa-arrow-left"></i> 返回首页</button>
            <h2 style="color: #333; margin-top: 20px;">选择学习级别</h2>
            <div class="level-grid" id="levelGrid"></div>
        </div>

        <!-- 课程列表 -->
        <div id="lessonListPage" class="page">
            <button class="back-btn" onclick="showLevelSelector()"><i class="fas fa-arrow-left"></i> 返回级别选择</button>
            <h2 style="color: #333;" id="levelTitle"></h2>
            <div class="lesson-list" id="lessonList"></div>
        </div>

        <!-- 单词学习 -->
        <div id="learningPage" class="page">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <button class="back-btn" onclick="quitLesson()"><i class="fas fa-times"></i> 退出本课</button>
                <span style="color: #666;" id="wordProgress">1 / 5</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 20%"></div></div>
            
            <div class="word-display">
                <div class="word-text" id="wordText"></div>
                <div class="word-phonetic">
                    <span id="wordPhonetic"></span>
                    <span class="spike-icon" onclick="speakCurrentWord()" title="播放发音">🔊</span>
                </div>
                <div class="word-meaning" id="wordMeaning"></div>
                <div class="word-root" id="wordRoot"></div>
            </div>
            
            <div class="input-area">
                <input type="text" id="wordInput" placeholder="请完整输入这个单词（支持大小写）" onkeyup="handleInput(event)">
            </div>
            <div class="feedback" id="feedback"></div>
            <div style="text-align: center;">
                <button class="btn" id="checkBtn" onclick="checkAnswer()">提交答案 (Enter)</button>
                <button class="btn btn-secondary" id="nextBtn" onclick="nextWord()" style="display:none">下一个单词 →</button>
            </div>
        </div>

        <!-- 句子练习 -->
        <div id="sentencePage" class="page">
            <button class="back-btn" onclick="quitLesson()"><i class="fas fa-times"></i> 退出本课</button>
            <h3 style="color: #333; margin: 20px 0 25px;">用刚学的单词完成句子</h3>
            
            <div style="background: #f8f9fa; padding: 25px; border-radius: 15px; margin-bottom: 25px;">
                <p style="font-size: 16px; color: #666; margin-bottom: 15px;"><strong>中文提示：</strong><span id="sentenceChinese"></span></p>
                <div class="sentence-blank" id="sentenceBlank"></div>
                <span class="spike-icon" onclick="speakSentence()" style="display: block; text-align: center; margin-top: 15px;">🔊 听例句</span>
            </div>
            
            <div class="input-area">
                <input type="text" id="sentenceInput" placeholder="请输入完整英文句子" onkeyup="handleInput(event)">
            </div>
            <div class="feedback" id="sentenceFeedback"></div>
            <div style="text-align: center;">
                <button class="btn" id="sentenceCheckBtn" onclick="checkSentence()">提交 (Enter)</button>
                <button class="btn btn-secondary" id="finishBtn" onclick="finishLesson()" style="display:none">完成课程 🎉</button>
            </div>
        </div>

        <!-- 语法详解 -->
        <div id="grammarPage" class="page">
            <button class="back-btn" onclick="showHomePage()"><i class="fas fa-arrow-left"></i> 返回首页</button>
            <h2 style="color: #333; margin-top: 20px;">语法详解中心</h2>
            <div id="grammarList"></div>
        </div>

        <!-- 专项练习 -->
        <div id="practicePage" class="page">
            <button class="back-btn" onclick="showHomePage()"><i class="fas fa-arrow-left"></i> 返回首页</button>
            <h2 style="color: #333; margin-top: 20px;">专项练习模块</h2>
            <div class="nav-cards" id="practiceList"></div>
        </div>

        <!-- 完成页面 -->
        <div id="completePage" class="page">
            <div class="complete-page">
                <div class="complete-icon">🎉</div>
                <h2 style="color: #333; margin-bottom: 20px;">恭喜完成本课！</h2>
                <div class="stats" id="learnedCount"></div>
                <p style="color: #666; margin: 20px 0;">坚持学习，你的英语会越来越棒！</p>
                <button class="btn" onclick="showLevelSelector()">继续学习下一课</button>
            </div>
        </div>
    </div>
    
    <script>
    // ============================================
    // 完整英语学习知识库 - A1 到 C2
    // ============================================

                    { word: 'Seven', phonetic: '/ˈsev.ən/', chinese: '七', root: '来自拉丁语 septem' },

                    { word: 'Nine', phonetic: '/naɪn/', chinese: '九', root: '基础数字' },
                    { word: 'Ten', phonetic: '/ten/', chinese: '十', root: '两个 hand(手) 的 fingers(手指)' }

                ],

                    { chinese: '天空是蓝色的。', sentence: 'The sky is blue.', blanks: ['blue'], focus: ['形容词位置'] },
                    { chinese: '我喜欢红色的花。', sentence: 'I like red flowers.', blanks: ['red'], focus: ['形容词修饰名词'] }
                ]
            },
            {

                description: '学会称呼和家人相关的单词',

    // ========== 语法讲解内容 ==========
    const GRAMMAR_GUIDES = [
        {
            title: '① 主谓一致（Subject-Verb Agreement）',
            content: '主语和谓语动词在人称和数上要保持一致。第三人称单数主语，动词要加-s。',
            examples: [
                'I am a student. （第一人称用 am）',
                'You are my friend. （第二人称用 are）',
                'He/She/It is happy. （第三人称单数用 is，动词加-s）',
                'We/They are students. （复数用 are）'
            ]
        },
        {
            title: '② 一般现在时（Simple Present Tense）',
            content: '表示经常性、习惯性的动作或普遍真理。第三人称单数要在动词后加-s/-es。',
            examples: [
                'I work in an office. （我通常在办公室工作）',
                'She reads books every night. （她每晚都读书）',
                'The sun rises in the east. （太阳从东方升起 - 普遍真理）'
            ]
        },
        {
            title: '③ 一般过去时（Simple Past Tense）',
            content: '表示过去某个时间发生的动作或状态。规则动词加-ed，不规则动词需特殊记忆。',
            examples: [
                'I went to school yesterday. （go 的不规则过去式是 went）',
                'She watched a movie last night. （watch 加-ed）',
                'They played football yesterday. （play 加-ed）'
            ]
        },
        {
            title: '④ 形容词的位置',
            content: '形容词通常放在名词前面，或者 be 动词之后作表语。',
            examples: [
                'A beautiful flower. （形容词在名词前）',
                'The flower is beautiful. （形容词在 be 动词后）',
                'She has a red car. （多个形容词按规则排序）'
            ]
        },
        {
            title: '⑤ 冠词的使用（a/an/the）',
            content: 'a/an 用于泛指，the 用于特指。元音开头的单词用 an。',
            examples: [
                'I have a book. （泛指一本书）',
                'The book is mine. （特指那本书）',
                'She is an apple. （an 用于元音开头）'
            ]
        },
        {
            title: '⑥ 疑问句的构成',
            content: '一般疑问句把 be 动词/助动词提前；特殊疑问句用 what/where/when/why/how 等引导。',
            examples: [
                'Are you happy? （be 动词提前）',
                'Do you like coffee? （加 do 提问）',
                'What is your name? （特殊疑问词）',
                'Where do you live? （where+ 助动词+ 主语）'
            ]
        }
    ];
    
    // ========== 专项练习内容 ==========
    const PRACTICE_MODULES = [
        { icon: 'fa-volume-up', title: '听力强化', desc: '听音频选单词，提高听力能力' },
        { icon: 'fa-exchange-alt', title: '句型转换', desc: '将肯定句变否定句/疑问句' },
        { icon: 'fa-bolt', title: '快速拼写', desc: '限时拼写挑战，提升速度' },
        { icon: 'fa-magic', title: '同义词替换', desc: '学会用不同的方式表达相同意思' },
        { icon: 'fa-puzzle-piece', title: '完形填空', desc: '根据上下文填写正确的单词' },
        { icon: 'fa-comments', title: '口语对话', desc: '模拟真实对话场景练习' }
    ];
    
    // ============================================
    // 应用逻辑
    // ============================================
    
    // 全局状态
    let currentLessons = [];
    let currentSentenceIndex = 0;
    let currentIndex = 0;
    let learnedWords = [];
    let currentWord = null;
    let currentSentence = null;
    
    console.log('🚀 英语大师 Pro 启动中...');
    console.log('📚 可用课程:', ENGLISH_DB.level_a1.length, '课');
    
    // ========== 页面切换 ==========
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    
    function showHomePage() { showPage('homePage'); }
    
    // ========== 级别选择 ==========
    function showLevelSelector() {
        const grid = document.getElementById('levelGrid');
        grid.innerHTML = '';
        
        const levels = [
            { id: 'A1', name: 'A1', desc: '入门级 · 5 课完整内容' },
            { id: 'A2', name: 'A2', desc: '初级 · 开发中' },
            { id: 'B1', name: 'B1', desc: '中级 · 开发中' },
            { id: 'B2', name: 'B2', desc: '中高级 · 开发中' },
            { id: 'C1', name: 'C1', desc: '高级 · 开发中' },
            { id: 'C2', name: 'C2', desc: '精通级 · 开发中' }
        ];
        
        levels.forEach(l => {
            const btn = document.createElement('button');
            btn.className = 'level-btn';
            btn.innerHTML = l.name + '<small>' + l.desc + '</small>';
            btn.onclick = () => selectLevel(l.id);
            grid.appendChild(btn);
        });
        
        showPage('levelSelectorPage');
    }
    
    function selectLevel(levelId) {
        const levelKey = 'level_' + levelId.toLowerCase();
        const lessons = ENGLISH_DB[levelKey];
        
        if (!lessons || lessons.length === 0) {
            alert(levelId + ' 级别课程正在精心开发中！\n\n目前只有 A1 级别的 5 课完整内容可以使用。\n请先选择 A1 开始学习！');
            return;
        }
        
        currentLessons = lessons;
        
        const list = document.getElementById('lessonList');
        list.innerHTML = '';
        document.getElementById('levelTitle').textContent = levelId + ' 级别 · ' + lessons.length + ' 课';
        
        lessons.forEach((lesson, idx) => {
            const div = document.createElement('div');
            div.className = 'lesson-item';
            div.innerHTML = `<h4>第${idx+1}课：${lesson.title}</h4><p>${lesson.description}</p><p style="color:#667eea;margin-top:8px">📖 ${lesson.words.length}个单词 · 💬 ${lesson.sentences.length}个句子</p>`;
            div.onclick = () => startLesson(idx);
            list.appendChild(div);
        });
        
        showPage('lessonListPage');
    }
    
    function showPracticeList() {
        const list = document.getElementById('practiceList');
        list.innerHTML = '';
        
        PRACTICE_MODULES.forEach(m => {
            const div = document.createElement('div');
            div.className = 'nav-card';
            div.innerHTML = `<i class="fas ${m.icon}"></i><h3>${m.title}</h3><p>${m.desc}</p>`;
            div.onclick = () => alert(`${m.title}模块正在开发中！\n即将上线，敬请期待！`);
            list.appendChild(div);
        });
        
        showPage('practicePage');
    }
    
    function showGrammarGuide() {
        const list = document.getElementById('grammarList');
        list.innerHTML = '';
        
        GRAMMAR_GUIDES.forEach(g => {
            const div = document.createElement('div');
            div.className = 'grammar-card';
            let examplesHtml = g.examples.map(e => `<div class="grammar-example">${e}</div>`).join('');
            div.innerHTML = `<div class="grammar-title">${g.title}</div><div class="grammar-content">${g.content}</div>${examplesHtml}`;
            list.appendChild(div);
        });
        
        showPage('grammarPage');
    }
    
    // ========== 课程学习 ==========
    function startLesson(index) {
        const lesson = currentLessons[index];
        if (!lesson) return;
        
        currentIndex = 0;
        currentSentenceIndex = 0;
        learnedWords = [];
        currentLessons = lesson.words;
        currentSentence = lesson.sentences;
        
        loadWord();
        showPage('learningPage');
    }
    
    function loadWord() {
        if (currentIndex >= currentLessons.length) {
            // 所有单词学完，进入句子练习
            enterSentencePractice();
            return;
        }
        
        const wordObj = currentLessons[currentIndex];
        currentWord = wordObj.word;
        
        document.getElementById('wordText').textContent = currentWord;
        document.getElementById('wordPhonetic').textContent = wordObj.phonetic || '';
        document.getElementById('wordMeaning').textContent = wordObj.chinese || '';
        document.getElementById('wordRoot').innerHTML = `📚 <strong>词根解析：</strong>${wordObj.root || '暂无'}`;
        
        // 更新进度
        document.getElementById('wordProgress').textContent = `${currentIndex + 1} / ${currentLessons.length}`;
        document.getElementById('progressFill').style.width = `${((currentIndex + 1) / currentLessons.length * 100)}%`;
        
        document.getElementById('wordInput').value = '';
        document.getElementById('wordInput').className = '';
        document.getElementById('feedback').textContent = '';
        document.getElementById('checkBtn').style.display = 'inline-block';
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('wordInput').focus();
    }
    
    function handleInput(e) {
        if (e.key !== 'Enter') return;
        
        const currentPage = document.querySelector('.page.active').id;
        
        if (currentPage === 'learningPage') {
            if (document.getElementById('checkBtn').style.display !== 'none') {
                checkAnswer();
            } else {
                nextWord();
            }
        } else if (currentPage === 'sentencePage') {
            if (document.getElementById('sentenceCheckBtn').style.display !== 'none') {
                checkSentence();
            } else {
                finishLesson();
            }
        }
    }
    
    function checkAnswer() {
        const input = document.getElementById('wordInput');
        const userValue = input.value.trim().toLowerCase();
        const correctValue = currentWord.toLowerCase();
        
        if (userValue === correctValue) {
            input.className = 'correct';
            document.getElementById('feedback').textContent = '✅ 太棒了！回答正确！';
            document.getElementById('feedback').className = 'feedback success';
            document.getElementById('checkBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'inline-block';
            speak(currentWord);
            learnedWords.push(currentWord);
        } else {
            input.className = 'wrong';
            document.getElementById('feedback').textContent = `❌ 正确答案：${currentWord}`;
            document.getElementById('feedback').className = 'feedback error';
            setTimeout(() => {
                input.className = '';
                document.getElementById('feedback').textContent = '';
            }, 2000);
        }
    }
    
    function nextWord() {
        currentIndex++;
        loadWord();
    }
    
    // ========== 句子练习 ==========
    function enterSentencePractice() {
        if (!currentSentence || currentSentence.length === 0) {
            finishLesson();
            return;
        }
        
        const sen = currentSentence[currentSentenceIndex];
        document.getElementById('sentenceChinese').textContent = sen.chinese;
        document.getElementById('sentenceBlank').innerHTML = `__________ <span style="color:#666;font-size:16px">(共${sen.sentence.split(' ').length}个单词)</span>`;
        
        document.getElementById('sentenceInput').value = '';
        document.getElementById('sentenceFeedback').textContent = '';
        document.getElementById('sentenceCheckBtn').style.display = 'inline-block';
        document.getElementById('finishBtn').style.display = 'none';
        document.getElementById('sentenceInput').focus();
        
        showPage('sentencePage');
    }
    
    function checkSentence() {
        const input = document.getElementById('sentenceInput');
        const sen = currentSentence[currentSentenceIndex];
        const userValue = input.value.trim().toLowerCase().replace(/[.,!?]/g, '');
        const correctValue = sen.sentence.toLowerCase().replace(/[.,!?]/g, '');
        
        if (userValue === correctValue) {
            input.style.borderColor = '#10b981';
            input.style.background = '#d1fae5';
            document.getElementById('sentenceFeedback').textContent = '✅ 完美！句子填写正确！';
            document.getElementById('sentenceFeedback').className = 'feedback success';
            document.getElementById('sentenceCheckBtn').style.display = 'none';
            document.getElementById('finishBtn').style.display = 'inline-block';
            speak(sen.sentence);
        } else {
            input.style.borderColor = '#ef4444';
            input.style.background = '#fee2e2';
            document.getElementById('sentenceFeedback').textContent = `❌ 再试试！参考答案：${sen.sentence}`;
            document.getElementById('sentenceFeedback').className = 'feedback error';
            setTimeout(() => {
                input.style.borderColor = '';
                input.style.background = '';
                document.getElementById('sentenceFeedback').textContent = '';
            }, 3000);
        }
    }
    
    // ========== 完成课程 ==========
    function finishLesson() {
        document.getElementById('learnedCount').innerHTML = 
            `📚 学会了 <strong>${learnedWords.length}</strong> 个单词<br>💬 完成了 <strong>${currentSentenceIndex + 1}</strong> 个句子`;
        showPage('completePage');
    }
    
    function quitLesson() {
        if (confirm('确定要退出当前课程吗？\n当前进度将不保存。')) {
            showLevelSelector();
        }
    }
    
    // ========== 语音功能 ==========
    function speak(text) {
        if ('speechSynthesis' in window) {
            speechSynthesis.cancel(); // 停止之前的发音
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8; // 稍慢一点更易听清
            speechSynthesis.speak(utterance);
        } else {
            console.log('浏览器不支持语音合成');
        }
    }
    
    function speakCurrentWord() {
        if (currentWord) speak(currentWord);
    }
    
    function speakSentence() {
        if (currentSentence && currentSentence[currentSentenceIndex]) {
            speak(currentSentence[currentSentenceIndex].sentence);
        }
    }
    
    // ========== 初始化 ==========
    function init() {
        console.log('✅ 英语大师 Pro 已就绪！');
        console.log('📦 数据库载入:', Object.keys(ENGLISH_DB).length, '个模块');
        showHomePage();
    }
    
    // DOM 加载完成后初始化
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    </script>
</body>
</html>
